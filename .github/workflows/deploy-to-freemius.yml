name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create plugin ZIP
        run: |
          mkdir -p /tmp/frontend-image-replace
          rsync -a --exclude='.git' --exclude='.github' ./ /tmp/frontend-image-replace/
          cd /tmp && zip -r frontend-image-replace-${{ steps.version.outputs.VERSION }}.zip frontend-image-replace/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/frontend-image-replace-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
