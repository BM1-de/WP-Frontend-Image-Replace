name: Release & Deploy to Freemius

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create plugin ZIP
        run: |
          mkdir -p /tmp/frontend-image-replace
          rsync -a --exclude='.git' --exclude='.github' ./ /tmp/frontend-image-replace/
          find /tmp/frontend-image-replace -name '.*' -not -name '.' -not -name '..' | xargs rm -rf 2>/dev/null || true
          find /tmp/frontend-image-replace -name '*.patch' | xargs rm -f 2>/dev/null || true
          cd /tmp && zip -r frontend-image-replace-${{ steps.version.outputs.VERSION }}.zip frontend-image-replace/
          cp /tmp/frontend-image-replace-${{ steps.version.outputs.VERSION }}.zip ${{ github.workspace }}/frontend-image-replace.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/frontend-image-replace-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true

      - name: Deploy to Freemius
        uses: buttonizer/freemius-deploy@v0.1.3
        with:
          file_name: frontend-image-replace.zip
          release_mode: pending
          version: ${{ steps.version.outputs.VERSION }}
          sandbox: false
        env:
          PUBLIC_KEY: pk_3db1f792d77e8537a040628bc671d
          DEV_ID: 13073
          SECRET_KEY: ${{ secrets.FREEMIUS_SECRET_KEY }}
          PLUGIN_SLUG: fir
          PLUGIN_ID: 26225
